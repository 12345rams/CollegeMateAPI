server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=FRAMEWORK


# MongoDB Configuration
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/collegemate}

# Security / JWT Configuration
collegemate.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
collegemate.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# Frontend / CORS
collegemate.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Backend URL (for OAuth redirect-uri etc.)
collegemate.backend.url=${BACKEND_URL:http://localhost:8080}

# Qdrant Vector Database Configuration
qdrant.url=${QDRANT_URL:https://347b3f24-6aa2-46b1-a1b5-e071c911abc5.us-east-1-1.aws.cloud.qdrant.io}
qdrant.api-key=${QDRANT_API_KEY:}
qdrant.collection-name=${QDRANT_COLLECTION:collegemate}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.collegemate=DEBUG

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Admin Credentials
collegemate.admin.username=${ADMIN_USERNAME:admin@collegemate.com}
collegemate.admin.password=${ADMIN_PASSWORD:admin123}
